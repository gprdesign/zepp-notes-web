<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- refresh via JS pra não perder estado -->
  <title>Central — Gio</title>
  <style>
    :root {
      --bg: #0d1117;
      --text: #f0f0f0;
      --sub: rgba(240,240,240,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100dvh; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    .wrapper {
      width: 100%; height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: clamp(10px, 3vw, 20px);
      gap: clamp(8px, 2.5vw, 14px);
    }

    /* ── GRID portrait: 2 col × 3 linhas + row auto p/ futebol ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr auto;
      gap: clamp(6px, 2vw, 12px);
      flex: 1;
      min-height: 0;
    }

    /* ── CARD base ── */
    .card {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: clamp(3px, 1vh, 8px);
      padding: clamp(8px, 2.5vw, 18px) clamp(10px, 3vw, 20px);
      border-radius: clamp(14px, 4vw, 22px);
      text-decoration: none;
      color: var(--text);
      transition: transform 0.1s, filter 0.1s;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    .card:active { transform: scale(0.95); filter: brightness(1.2); }

    .card[data-c="blue"]   { background: linear-gradient(135deg, rgba(112,184,255,0.22), rgba(112,184,255,0.07)); border: 1px solid rgba(112,184,255,0.38); }
    .card[data-c="purple"] { background: linear-gradient(135deg, rgba(176,125,255,0.22), rgba(176,125,255,0.07)); border: 1px solid rgba(176,125,255,0.38); }
    .card[data-c="teal"]   { background: linear-gradient(135deg, rgba(0,200,180,0.22),   rgba(0,200,180,0.07));   border: 1px solid rgba(0,200,180,0.38);   }
    .card[data-c="orange"] { background: linear-gradient(135deg, rgba(255,140,66,0.22),  rgba(255,140,66,0.07));  border: 1px solid rgba(255,140,66,0.38);  }

    /* Card STATUS — portrait: banner topo (span 2 col × 1 linha) */
    .card[data-c="status"] {
      background: linear-gradient(135deg, rgba(176,125,255,0.22), rgba(112,184,255,0.12));
      border: 1px solid rgba(176,125,255,0.4);
      justify-content: center;
      align-items: flex-start;
      flex-direction: row;
      flex-wrap: wrap;
      gap: clamp(4px, 2vw, 12px);
      grid-column: span 2;
      cursor: pointer;
      padding: clamp(8px, 2vw, 14px) clamp(12px, 3vw, 20px);
    }

    .card::after {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 60%; height: 35%;
      background: rgba(255,255,255,0.05);
      border-radius: 0 0 100% 0;
      pointer-events: none;
    }

    /* Portrait mobile: vw generosos, mínimos grandes */
    .card-icon { font-size: clamp(2.2rem, 9vw, 4.5rem); position: relative; z-index: 1; }
    .card-name { font-size: clamp(1.4rem, 5.5vw, 3rem); font-weight: 900; line-height: 1.2; position: relative; z-index: 1; }
    .card-desc { font-size: clamp(1rem, 3.5vw, 1.8rem); color: var(--sub); line-height: 1.3; position: relative; z-index: 1; }

    /* ── STATUS portrait: banner row ── */
    .status-left  { display: flex; flex-direction: column; justify-content: center; flex-shrink: 0; gap: 1px; }
    .status-right { display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0; gap: 3px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: clamp(8px,2.5vw,16px); overflow: hidden; }
    .status-label { font-size: clamp(0.375rem, 1.35vw, 0.54rem); text-transform: uppercase; letter-spacing: 2px; color: var(--sub); }
    .status-time  { font-size: clamp(1.8rem, 7.5vw, 4.125rem); font-weight: 900; letter-spacing: -2px; line-height: 1; }
    .status-bat   { font-size: clamp(0.6375rem, 2.625vw, 1.35rem); font-weight: 800; color: rgba(255,255,255,0.85); }

    /* Notificações */
    .notif-list  { width: 100%; display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
    .notif-item  { display: flex; align-items: flex-start; gap: 5px; background: rgba(255,255,255,0.07); border-radius: 7px; padding: 4px 8px; }
    .notif-app   { font-size: clamp(0.45rem, 1.5vw, 0.6375rem); font-weight: 800; color: rgba(255,255,255,0.45); flex-shrink: 0; white-space: nowrap; }
    .notif-text  { font-size: clamp(0.4875rem, 1.65vw, 0.7125rem); color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .notif-empty { font-size: clamp(0.45rem, 1.5vw, 0.6375rem); color: rgba(255,255,255,0.3); font-style: italic; }

    /* ── CARD FUTEBOL — compacto, altura de ~1 card ── */
    .card[data-c="soccer"] {
      background: linear-gradient(135deg, rgba(0,210,100,0.15), rgba(0,210,100,0.04));
      border: 1px solid rgba(0,210,100,0.3);
      grid-column: span 2;
      flex-direction: column;
      justify-content: center;
      gap: clamp(3px, 0.8vh, 6px);
      padding: clamp(6px, 1.8vw, 12px) clamp(8px, 2.5vw, 14px);
      cursor: default;
      min-height: 0;
    }
    .soccer-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .soccer-title {
      font-size: clamp(0.676rem, 2.08vw, 0.884rem);
      font-weight: 900; color: rgba(0,210,100,0.85);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .soccer-updated {
      font-size: clamp(0.585rem, 1.43vw, 0.715rem);
      color: rgba(255,255,255,0.25);
    }
    .soccer-cols      { display: flex; flex-direction: column; flex: 1; min-height: 0; gap: clamp(3px,0.8vh,6px); overflow: hidden; }
    .soccer-list      { display: flex; flex-direction: column; gap: clamp(2px,0.5vh,4px); overflow: hidden; flex-shrink: 0; }
    .soccer-list-next { border-top: 1px solid rgba(255,255,255,0.08); padding-top: clamp(3px,0.8vh,6px); }
    /* linha compacta: time — placar — time tudo numa linha só */
    .match-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 4px;
      padding: clamp(2px, 0.5vh, 4px) clamp(4px, 1vw, 8px);
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .match-row.live { background: rgba(0,210,100,0.1); border-left: 2px solid #00d264; }
    .match-row.ft   { opacity: 0.45; }
    .team-side      { display: flex; align-items: center; gap: 4px; overflow: hidden; }
    .team-side.away { flex-direction: row-reverse; }
    .team-crest     { width: clamp(13px,3.25vw,18px); height: clamp(13px,3.25vw,18px); object-fit: contain; flex-shrink: 0; }
    .team-name      { font-size: clamp(0.715rem, 2.21vw, 0.936rem); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .match-score    { text-align: center; flex-shrink: 0; line-height: 1; }
    .score-nums     { font-size: clamp(0.845rem, 2.86vw, 1.144rem); font-weight: 900; letter-spacing: 1px; display: block; }
    .score-status   { font-size: clamp(0.52rem, 1.3vw, 0.676rem); color: rgba(255,255,255,0.4); display: block; }
    .score-status.live-dot { color: #00d264; font-weight: 800; }
    .soccer-empty   { font-size: clamp(0.715rem, 1.95vw, 0.91rem); color: rgba(255,255,255,0.3); font-style: italic; }

    /* ── cards menores: relógio, contador, cazetv, /hj (-40% total) ── */
    .card[data-c="teal"]   .card-icon,
    .card[data-c="blue"]   .card-icon,
    .card[data-c="purple"] .card-icon,
    .card[data-c="orange"] .card-icon { font-size: clamp(1.4025rem, 5.7375vw, 2.8687rem); }

    .card[data-c="teal"]   .card-name,
    .card[data-c="blue"]   .card-name,
    .card[data-c="purple"] .card-name,
    .card[data-c="orange"] .card-name { font-size: clamp(0.8925rem, 3.5063vw, 1.9125rem); }

    .card[data-c="teal"]   .card-desc,
    .card[data-c="blue"]   .card-desc,
    .card[data-c="purple"] .card-desc,
    .card[data-c="orange"] .card-desc { font-size: clamp(0.6375rem, 2.2312vw, 1.1475rem); }

    .footer { font-size: clamp(0.7rem, 2vw, 0.9rem); color: var(--sub); opacity: 0.3; text-align: center; flex-shrink: 0; }

    /* ── LANDSCAPE mobile ── */
    @media (orientation: landscape) and (max-height: 500px) {
      .wrapper {
        flex-direction: row;
        align-items: stretch;
        padding: clamp(6px, 1.5vw, 12px);
        gap: clamp(6px, 1.5vw, 12px);
      }

      .grid {
        flex: 1;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr auto;
        gap: clamp(6px, 1.5vw, 12px);
      }

      .card[data-c="status"] {
        grid-row: span 2;
        grid-column: span 1;
        flex-direction: column;
        align-items: flex-start;
        padding: clamp(10px, 2vw, 18px);
      }
      .status-right { border-left: none; border-top: 1px solid rgba(255,255,255,0.1); padding-left: 0; padding-top: clamp(5px,1vh,10px); }
      .card[data-c="soccer"] { grid-column: span 3; }

      /* Landscape: -25% em tudo exceto copa e hora */
      .card-icon   { font-size: clamp(1.35rem, 3.75vw, 2.625rem); }
      .card-name   { font-size: clamp(0.9rem, 2.625vw, 1.875rem); }
      .card-desc   { font-size: clamp(0.675rem, 1.875vw, 1.35rem); }

      /* -25% adicional nos 4 cards menores no landscape */
      .card[data-c="teal"]   .card-icon,
      .card[data-c="blue"]   .card-icon,
      .card[data-c="purple"] .card-icon,
      .card[data-c="orange"] .card-icon { font-size: clamp(0.8606rem, 2.3906vw, 1.6734rem); }

      .card[data-c="teal"]   .card-name,
      .card[data-c="blue"]   .card-name,
      .card[data-c="purple"] .card-name,
      .card[data-c="orange"] .card-name { font-size: clamp(0.5737rem, 1.6734vw, 1.1954rem); }

      .card[data-c="teal"]   .card-desc,
      .card[data-c="blue"]   .card-desc,
      .card[data-c="purple"] .card-desc,
      .card[data-c="orange"] .card-desc { font-size: clamp(0.4303rem, 1.1954vw, 0.8606rem); }

      /* Landscape: hora mantida, notif -25% */
      .status-time  { font-size: clamp(2.175rem, 7.425vw, 4.725rem); letter-spacing: -2px; }
      .status-bat   { font-size: clamp(1.05rem, 3.375vw, 2.25rem); }
      .status-label { font-size: clamp(0.525rem, 1.35vw, 0.9rem); }
      .notif-app    { font-size: clamp(0.525rem, 1.35vw, 0.75rem); }
      .notif-text   { font-size: clamp(0.5625rem, 1.5vw, 0.825rem); }
      .notif-empty  { font-size: clamp(0.525rem, 1.35vw, 0.75rem); }

      /* Landscape: copa em 2 colunas */
      .soccer-cols      { flex-direction: row; gap: clamp(6px,1.5vw,12px); }
      .soccer-list      { flex: 1; min-width: 0; }
      .soccer-list-next { border-top: none; border-left: 1px solid rgba(255,255,255,0.08); padding-top: 0; padding-left: clamp(6px,1.5vw,12px); }

      .footer { display: none; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="grid">

    <!-- STATUS: banner topo (span 2 col) — clique recarrega -->
    <div class="card" data-c="status" onclick="refreshAll()">
      <div class="status-left">
        <div class="status-label">agora · toque p/ atualizar</div>
        <div class="status-time" id="s-time">--:--</div>
        <div class="status-bat"  id="s-bat">🔋 --</div>
      </div>
      <div class="status-right">
        <div class="notif-list" id="notif-list"><div class="notif-empty">carregando…</div></div>
      </div>
    </div>

    <!-- Col 2 linha 1 -->
    <a class="card" data-c="teal" href="https://gprdesign.github.io/relogio/" target="_blank">
      <div class="card-icon">🕐</div>
      <div class="card-name">Relógio</div>
      <div class="card-desc">Hora ao vivo</div>
    </a>

    <!-- Col 2 linha 2 -->
    <a class="card" data-c="blue" href="https://gprdesign.github.io/contador/" target="_blank">
      <div class="card-icon">⏱️</div>
      <div class="card-name">Contador</div>
      <div class="card-desc">Timer regressivo</div>
    </a>

    <!-- Linha 3 col 1 -->
    <a class="card" data-c="purple" href="https://youtube.com/cazetv" target="_blank">
      <div class="card-icon">▶️</div>
      <div class="card-name">CazeTV</div>
      <div class="card-desc">youtube.com/cazetv</div>
    </a>

    <!-- Linha 3 col 2 -->
    <a class="card" data-c="orange" href="https://site.zapia.com/3bci44hn" target="_blank">
      <div class="card-icon">☀️</div>
      <div class="card-name">/hj</div>
      <div class="card-desc">Tarefas do dia</div>
    </a>

    <!-- Zepp Notes -->
    <a class="card" data-c="teal" href="https://gio.s.gy/zepp" target="_blank">
      <div class="card-icon">⌚</div>
      <div class="card-name">Zepp Notes</div>
      <div class="card-desc">Notas do Bip 6</div>
    </a>

    <!-- FUTEBOL — Copa do Mundo jogos do dia -->
    <div class="card" data-c="soccer">
      <div class="soccer-header">
        <span class="soccer-title">⚽ Copa do Mundo 2026</span>
        <span class="soccer-updated" id="soccer-updated">--</span>
      </div>
      <div class="soccer-cols" id="soccer-cols">
        <!-- portrait: lista única; landscape: 2 colunas via JS -->
        <div class="soccer-list" id="soccer-list-past">
          <div class="soccer-empty">carregando…</div>
        </div>
        <div class="soccer-list soccer-list-next" id="soccer-list-next"></div>
      </div>
    </div>

  </div>
  <div class="footer">Central v2 · atualiza a cada 1min</div>
</div>

<script>
  function tick() {
    const n = new Date();
    document.getElementById('s-time').textContent =
      n.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }
  setInterval(tick, 1000); tick();

  if (navigator.getBattery) {
    navigator.getBattery().then(function(bat) {
      function updateBat() {
        const pct  = Math.round(bat.level * 100);
        const icon = bat.charging ? '⚡' : (pct > 20 ? '🔋' : '🪫');
        document.getElementById('s-bat').textContent = icon + ' ' + pct + '%';
      }
      updateBat();
      bat.addEventListener('levelchange',    updateBat);
      bat.addEventListener('chargingchange', updateBat);
    });
  }

  /* Notificações — lê do Gist a cada 30s */
  const NOTIFS_URL = 'https://gist.githubusercontent.com/gprdesign/42fc7f8c34f1f29a73c48462f6d9c537/raw/notifs.json';
  function loadNotifs() {
    fetch(NOTIFS_URL + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const list   = document.getElementById('notif-list');
        const notifs = (data.notifs || []).slice(0, 4);
        if (!notifs.length) { list.innerHTML = '<div class="notif-empty">sem notificações</div>'; return; }
        list.innerHTML = notifs.map(n =>
          `<div class="notif-item">
            <span class="notif-app">${n.app || '?'}</span>
            <span class="notif-text">${n.title ? n.title + ': ' : ''}${n.text || ''}</span>
          </div>`).join('');
      })
      .catch(() => { document.getElementById('notif-list').innerHTML = '<div class="notif-empty">—</div>'; });
  }
  loadNotifs();
  setInterval(loadNotifs, 30000);

  /* ── refresh geral a cada 60s + botão de relógio ── */
  function refreshAll() { loadNotifs(); loadMatches(); }
  setInterval(refreshAll, 60000);

  /* ═══ COPA DO MUNDO — jogos do dia ═══ */
  const MATCHES_URL = 'https://gist.githubusercontent.com/gprdesign/b0c5e0453069a01d36cbdd6a860a7e29/raw/matches.json';

  const STATUS_LABEL = {
    'IN_PLAY':  { txt: '🟢 AO VIVO', cls: 'live-dot' },
    'PAUSED':   { txt: '⏸ Intervalo', cls: 'live-dot' },
    'FINISHED': { txt: 'FT', cls: '' },
    'TIMED':    { txt: null, cls: '' },
    'SCHEDULED':{ txt: null, cls: '' },
  };

  function matchRow(m) {
    const sl     = STATUS_LABEL[m.status] || { txt: m.status, cls: '' };
    const isLive = m.status === 'IN_PLAY' || m.status === 'PAUSED';
    const isFt   = m.status === 'FINISHED';
    const sh     = m.score_h !== null ? m.score_h : '-';
    const sa     = m.score_a !== null ? m.score_a : '-';
    // label: ao vivo → status; futuro → data+hora se dia diferente, senão só hora
    const timeLabel = sl.txt || m.time_br;
    const rowCls = isLive ? 'match-row live' : isFt ? 'match-row ft' : 'match-row';
    return `<div class="${rowCls}">
      <div class="team-side">
        <img class="team-crest" src="${m.home_crest}" onerror="this.style.display='none'">
        <span class="team-name">${m.home}</span>
      </div>
      <div class="match-score">
        <span class="score-nums">${sh} – ${sa}</span>
        <span class="score-status ${sl.cls}">${timeLabel}</span>
      </div>
      <div class="team-side away">
        <img class="team-crest" src="${m.away_crest}" onerror="this.style.display='none'">
        <span class="team-name">${m.away}</span>
      </div>
    </div>`;
  }

  function loadMatches() {
    fetch(MATCHES_URL + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const listPast = document.getElementById('soccer-list-past');
        const listNext = document.getElementById('soccer-list-next');
        const upd      = document.getElementById('soccer-updated');
        const ms       = data.matches || [];

        upd.textContent = data.date + ' · ' + (data.updated || '--');

        if (!ms.length) {
          listPast.innerHTML = '<div class="soccer-empty">Sem jogos 🤷</div>';
          listNext.innerHTML = '';
          return;
        }

        const isLandscape = window.matchMedia('(orientation: landscape) and (max-height: 500px)').matches;

        if (isLandscape) {
          // landscape: col esquerda = slot "today", col direita = slot "tomorrow"
          const todayMs    = ms.filter(m => m.slot === 'today');
          const tomorrowMs = ms.filter(m => m.slot === 'tomorrow');

          const todayLabel    = data.date_today    ? 'Hoje ' + data.date_today    : 'Hoje';
          const tomorrowLabel = data.date_tomorrow ? 'Amanhã ' + data.date_tomorrow : 'Amanhã';

          listPast.innerHTML = todayMs.length
            ? todayMs.map(matchRow).join('')
            : `<div class="soccer-empty">${todayLabel} sem jogos</div>`;

          listNext.innerHTML = tomorrowMs.length
            ? tomorrowMs.map(matchRow).join('')
            : `<div class="soccer-empty">${tomorrowLabel} sem jogos</div>`;
        } else {
          // portrait: tudo junto, máx 5
          listPast.innerHTML = ms.slice(0, 5).map(matchRow).join('');
          listNext.innerHTML = '';
        }
      })
      .catch(() => {
        document.getElementById('soccer-list-past').innerHTML =
          '<div class="soccer-empty">Erro ao carregar</div>';
      });
  }
  loadMatches();
  setInterval(loadMatches, 120000); // re-lê o gist a cada 2min
</script>
</body>
</html>
